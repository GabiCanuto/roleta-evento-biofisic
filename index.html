<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Roleta Everest</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    :root{
      --white:#ffffff;
      --muted:rgba(255,255,255,.78);
      --yellow:#ffcc00;
      --yellow-soft:#ffe178;
      --orange:#ff7a00;
      --red:#df0018;
      --brand:"Orbitron", Arial, sans-serif;
      --ui:"Inter", Arial, sans-serif;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body{
      min-height:100%;
    }

    body{
      min-height:100vh;
      font-family:var(--ui);
      color:var(--white);
      overflow-x:hidden;
      background:
        radial-gradient(circle at top, #2a0707 0%, #120606 26%, #080808 62%, #030303 100%);
      position:relative;
    }

    .bg{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:0;
    }

    .bg::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at center, transparent 0%, transparent 58%, rgba(0,0,0,.28) 82%, rgba(0,0,0,.50) 100%);
    }

    .bg::after{
      content:"";
      position:absolute;
      left:50%;
      top:0;
      transform:translateX(-50%);
      width:min(88vw, 900px);
      height:420px;
      background:
        radial-gradient(ellipse at center,
          rgba(255,122,0,.12) 0%,
          rgba(223,0,24,.10) 20%,
          rgba(255,204,0,.05) 36%,
          transparent 68%);
      filter:blur(18px);
      opacity:.75;
    }

    .container{
      position:relative;
      z-index:2;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px 14px 28px;
    }

    .content{
      width:100%;
      max-width:980px;
      text-align:center;
    }

    .hero{
      margin-bottom:16px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid rgba(255,204,0,.18);
      background:rgba(255,255,255,.06);
      backdrop-filter:blur(10px);
      color:var(--yellow-soft);
      font-weight:800;
      font-size:.9rem;
      margin-bottom:14px;
    }

    .title{
      font-family:var(--brand);
      font-size:clamp(2rem, 8vw, 4.2rem);
      line-height:1.02;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.04em;
      margin-bottom:10px;
      background:linear-gradient(90deg, #fff2bc, #ffcc00, #ff7a00, #ffe38b);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle{
      color:var(--muted);
      font-size:clamp(.95rem, 3vw, 1.05rem);
      line-height:1.55;
      max-width:680px;
      margin:0 auto;
      padding:0 8px;
    }

    .panel{
      width:100%;
      max-width:920px;
      margin:16px auto 0;
      padding:18px 12px 24px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(18,18,18,.82), rgba(10,10,10,.72));
      backdrop-filter:blur(10px);
      box-shadow:0 18px 50px rgba(0,0,0,.42);
      position:relative;
      overflow:hidden;
    }

    .panel::before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:min(72vw, 460px);
      height:min(72vw, 460px);
      border-radius:50%;
      background:
        radial-gradient(circle,
          rgba(255,122,0,.14) 0%,
          rgba(223,0,24,.10) 28%,
          rgba(255,204,0,.05) 46%,
          transparent 72%);
      filter:blur(20px);
      pointer-events:none;
    }

    .wheel-wrap{
      position:relative;
      width:min(94vw, 610px);
      height:min(94vw, 610px);
      margin:6px auto 16px;
    }

    .wheel-ring{
      position:absolute;
      inset:-12px;
      border-radius:50%;
      background:conic-gradient(
        from 0deg,
        rgba(255,255,255,.04),
        rgba(255,204,0,.24),
        rgba(255,122,0,.20),
        rgba(223,0,24,.18),
        rgba(255,204,0,.16),
        rgba(255,255,255,.04)
      );
      filter:blur(8px);
      opacity:.65;
      animation:rotateSlow 10s linear infinite;
    }

    @keyframes rotateSlow{
      from{transform:rotate(0deg)}
      to{transform:rotate(360deg)}
    }

    .pointer{
      position:absolute;
      top:-12px;
      left:50%;
      transform:translateX(-50%);
      width:0;
      height:0;
      border-left:22px solid transparent;
      border-right:22px solid transparent;
      border-top:42px solid #ffd84a;
      z-index:8;
      filter:
        drop-shadow(0 0 10px rgba(255,204,0,.60))
        drop-shadow(0 8px 14px rgba(0,0,0,.28));
    }

    .wheel{
      position:relative;
      width:100%;
      height:100%;
      border-radius:50%;
      display:grid;
      place-items:center;
      filter:drop-shadow(0 22px 44px rgba(0,0,0,.42));
    }

    .wheel-svg{
      width:100%;
      height:100%;
      display:block;
    }

    #wheelGroup{
      transform-origin:250px 250px;
      transition:transform 6.1s cubic-bezier(.12,.78,.16,1);
    }

    .center-logo{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:116px;
      height:116px;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,.05), transparent 28%),
        linear-gradient(145deg, #151515, #050505);
      border:2px solid rgba(255,204,0,.18);
      box-shadow:
        0 10px 18px rgba(0,0,0,.32),
        0 0 12px rgba(255,122,0,.10);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:4;
      overflow:hidden;
      pointer-events:none;
      padding:10px;
    }

    .center-logo img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .controls{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
    }

    .spin-btn{
      border:none;
      background:linear-gradient(90deg, #ffcc00, #ff7a00, #e30016);
      color:#fff;
      font-family:var(--brand);
      font-weight:900;
      font-size:.95rem;
      letter-spacing:.04em;
      text-transform:uppercase;
      padding:15px 24px;
      border-radius:999px;
      min-width:210px;
      cursor:pointer;
      box-shadow:
        0 14px 28px rgba(223,0,24,.20),
        inset 0 2px 10px rgba(255,255,255,.18);
      transition:transform .2s ease, opacity .2s ease;
    }

    .spin-btn:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    .message{
      min-height:24px;
      margin-top:2px;
      color:#ffe27a;
      font-size:.95rem;
      font-weight:800;
      padding:0 10px;
    }

    .result-box{
      width:100%;
      max-width:560px;
      margin-top:6px;
      padding:16px 14px;
      border-radius:18px;
      background:rgba(255,255,255,.06);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 14px 34px rgba(0,0,0,.22);
      display:none;
      white-space:pre-line;
    }

    .result-box.show{
      display:block;
    }

    .result-box h2{
      color:var(--yellow-soft);
      font-family:var(--brand);
      font-size:1.3rem;
      margin-bottom:8px;
      text-transform:uppercase;
    }

    .result-box p{
      color:#fff;
      font-size:.98rem;
      line-height:1.5;
    }

    .footer-note{
      margin-top:8px;
      color:rgba(255,240,210,.60);
      font-size:.88rem;
      padding:0 10px;
    }

    .modal{
      position:fixed;
      inset:0;
      z-index:20;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
      background:rgba(0,0,0,.72);
      backdrop-filter:blur(6px);
    }

    .modal-card{
      width:100%;
      max-width:400px;
      position:relative;
      overflow:hidden;
      border-radius:22px;
      padding:20px;
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(180deg, rgba(20,20,24,.98), rgba(9,9,12,.98));
      box-shadow:0 26px 70px rgba(0,0,0,.48);
    }

    .modal-content{
      position:relative;
      z-index:1;
    }

    .modal-card h2{
      font-family:var(--brand);
      font-size:1.35rem;
      color:var(--yellow-soft);
      margin-bottom:8px;
      text-transform:uppercase;
    }

    .modal-card p{
      color:rgba(255,245,230,.82);
      line-height:1.5;
      margin-bottom:14px;
      font-size:.92rem;
    }

    .field{
      text-align:left;
      margin-bottom:10px;
    }

    .field label{
      display:block;
      margin-bottom:6px;
      color:#f7efdf;
      font-size:.9rem;
      font-weight:800;
    }

    .field input{
      width:100%;
      padding:13px 13px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.06);
      color:#fff;
      outline:none;
      font-size:.96rem;
    }

    .field input::placeholder{
      color:rgba(255,255,255,.42);
    }

    .modal-btn{
      width:100%;
      margin-top:8px;
      padding:14px 15px;
      border:none;
      border-radius:14px;
      background:linear-gradient(90deg, #ffcc00, #ff7a00, #e30016);
      color:#fff;
      font-family:var(--brand);
      font-weight:900;
      font-size:.9rem;
      letter-spacing:.04em;
      text-transform:uppercase;
      cursor:pointer;
    }

    .warning{
      margin-top:10px;
      color:#ffcfb5;
      font-weight:800;
      min-height:20px;
      font-size:.88rem;
    }

    .loading-dots::after{
      content:"...";
      display:inline-block;
      margin-left:4px;
    }

    .slice-text{
      font-family:var(--brand);
      font-weight:800;
      fill:#fff;
      font-size:10px;
      text-anchor:middle;
      dominant-baseline:middle;
      paint-order:stroke;
      stroke:rgba(0,0,0,.26);
      stroke-width:2px;
      letter-spacing:.02em;
      text-transform:uppercase;
    }

    .slice-divider{
      stroke:rgba(255,255,255,.14);
      stroke-width:2;
    }

    .outer-ring{
      fill:none;
      stroke:rgba(255,255,255,.14);
      stroke-width:10;
    }

    .inner-ring{
      fill:url(#innerGlow);
      stroke:rgba(255,255,255,.10);
      stroke-width:5;
    }

    @media (max-width: 430px){
      .wheel-wrap{
        width:min(96vw, 470px);
        height:min(96vw, 470px);
      }

      .center-logo{
        width:92px;
        height:92px;
      }

      .slice-text{
        font-size:6px;
      }

      .title{
        font-size:1.8rem;
      }

      .subtitle{
        font-size:.9rem;
      }

      .spin-btn{
        width:100%;
        max-width:290px;
      }
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div class="modal" id="entryModal">
    <div class="modal-card">
      <div class="modal-content">
        <h2>Participe da Roleta</h2>
        <p>Preencha seus dados para concorrer. Cada CPF pode jogar apenas uma vez.</p>

        <div class="field">
          <label for="nome">Nome</label>
          <input type="text" id="nome" placeholder="Digite seu nome completo" />
        </div>

        <div class="field">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" />
        </div>

        <div class="field">
          <label for="telefone">Número de telefone</label>
          <input type="text" id="telefone" placeholder="(00) 00000-0000" maxlength="15" />
        </div>

        <button class="modal-btn" id="startBtn">Participar</button>
        <div class="warning" id="modalWarning"></div>
      </div>
    </div>
  </div>

  <main class="container">
    <div class="content">
      <div class="hero">
        <div class="pill">✨ Campanha Everest</div>
        <h1 class="title">Roleta de Prêmios</h1>
        <p class="subtitle">
          Gire a roleta e descubra seu prêmio em uma experiência com a cara da Everest.
        </p>
      </div>

      <section class="panel">
        <div class="wheel-wrap">
          <div class="wheel-ring"></div>
          <div class="pointer"></div>

          <div class="wheel" id="wheel">
            <svg class="wheel-svg" viewBox="0 0 500 500" aria-hidden="true">
              <defs>
                <radialGradient id="innerGlow" cx="50%" cy="45%" r="70%">
                  <stop offset="0%" stop-color="#181818"/>
                  <stop offset="100%" stop-color="#060606"/>
                </radialGradient>
              </defs>

              <g id="wheelGroup"></g>
              <circle cx="250" cy="250" r="198" class="outer-ring"></circle>
              <circle cx="250" cy="250" r="86" class="inner-ring"></circle>
            </svg>
          </div>

          <div class="center-logo">
            <img src="logo-everest.png" alt="Logo Everest">
          </div>
        </div>

        <div class="controls">
          <button class="spin-btn" id="spinBtn" disabled>Girar roleta</button>
          <div class="message" id="message"></div>

          <div class="result-box" id="resultBox">
            <h2>Parabéns</h2>
            <p id="resultText"></p>
          </div>

          <p class="footer-note">Promoção sujeita às regras da campanha.</p>
        </div>
      </section>
    </div>
  </main>

  <audio id="spinSound" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
  <audio id="winSound" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
  <audio id="loseSound" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/270/270-preview.mp3"></audio>

  <script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwp-bJGsSpxoJ9GV206COIYzcHMLV-IRD6Zhhgk6QA4SzoHGz_yarz0AIXhDsGEZiVVHQ/exec";
    const prizes = [
      { label: "Cordão", color: "#B100FF", icon: "fa-tag" },
            { label: "Cupom 20%", color: "#00C2FF", icon: "fa-percent" },
      { label: "Bolsa Take", color: "#9BFF00", icon: "fa-bag-shopping" },
      { label: "Fone Everest", color: "#18A8E8", icon: "fa-headphones" },
      { label: "Copo térmico", color: "#FF7A00", icon: "fa-mug-hot" },
      { label: "Cupom 30%", color: "#E53170", icon: "fa-percent" },
      { label: "Chaveiro Take", color: "#5B8CFF", icon: "fa-key" },
      { label: "Aromatizante", color: "#7ED957", icon: "fa-spray-can-sparkles" },
      { label: "Cupom 40%", color: "#FF174D", icon: "fa-percent" }
    ];

    const weightedPrizes = [
      { label: "Cordão", weight: 28 },
      { label: "Bolsa Take", weight: 12 },
      { label: "Fone Everest", weight: 1.2 },
      { label: "Copo térmico", weight: 1.2 },
      { label: "Copo americano", weight: 4 },
      { label: "Chaveiro Take", weight: 8 },
      { label: "Aromatizante", weight: 12 },
      { label: "Cupom 20%", weight: 20 },
      { label: "Cupom 30%", weight: 12 },
      { label: "Cupom 40%", weight: 8 }
    ];

    const wheelGroup = document.getElementById("wheelGroup");
    const spinBtn = document.getElementById("spinBtn");
    const message = document.getElementById("message");
    const resultBox = document.getElementById("resultBox");
    const resultText = document.getElementById("resultText");

    const entryModal = document.getElementById("entryModal");
    const startBtn = document.getElementById("startBtn");
    const modalWarning = document.getElementById("modalWarning");
    const nomeInput = document.getElementById("nome");
    const cpfInput = document.getElementById("cpf");
    const telefoneInput = document.getElementById("telefone");

    const spinSound = document.getElementById("spinSound");
    const winSound = document.getElementById("winSound");
    const loseSound = document.getElementById("loseSound");

    let currentRotation = 0;
    let isSpinning = false;
    let participant = null;

    function polarToCartesian(cx, cy, r, angleDeg) {
      const rad = (angleDeg - 90) * Math.PI / 180;
      return {
        x: cx + r * Math.cos(rad),
        y: cy + r * Math.sin(rad)
      };
    }

    function createSectorPath(cx, cy, outerR, innerR, startAngle, endAngle) {
      const startOuter = polarToCartesian(cx, cy, outerR, endAngle);
      const endOuter = polarToCartesian(cx, cy, outerR, startAngle);
      const startInner = polarToCartesian(cx, cy, innerR, startAngle);
      const endInner = polarToCartesian(cx, cy, innerR, endAngle);
      const largeArcFlag = endAngle - startAngle <= 180 ? 0 : 1;

      return [
        `M ${startOuter.x} ${startOuter.y}`,
        `A ${outerR} ${outerR} 0 ${largeArcFlag} 0 ${endOuter.x} ${endOuter.y}`,
        `L ${startInner.x} ${startInner.y}`,
        `A ${innerR} ${innerR} 0 ${largeArcFlag} 1 ${endInner.x} ${endInner.y}`,
        "Z"
      ].join(" ");
    }

    function renderWheel() {
      wheelGroup.innerHTML = "";

      const cx = 250;
      const cy = 250;
      const outerR = 198;
      const innerR = 86;
      const total = prizes.length;
      const sliceAngle = 360 / total;

      prizes.forEach((item, index) => {
        const startAngle = index * sliceAngle;
        const endAngle = startAngle + sliceAngle;
        const midAngle = startAngle + sliceAngle / 2;

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", createSectorPath(cx, cy, outerR, innerR, startAngle, endAngle));
        path.setAttribute("fill", item.color);
        path.setAttribute("stroke", "rgba(255,255,255,.08)");
        path.setAttribute("stroke-width", "1.5");
        wheelGroup.appendChild(path);

        const dividerStart = polarToCartesian(cx, cy, innerR, startAngle);
        const dividerEnd = polarToCartesian(cx, cy, outerR, startAngle);

        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", dividerStart.x);
        line.setAttribute("y1", dividerStart.y);
        line.setAttribute("x2", dividerEnd.x);
        line.setAttribute("y2", dividerEnd.y);
        line.setAttribute("class", "slice-divider");
        wheelGroup.appendChild(line);

        const iconRadius = 122;
        const iconPos = polarToCartesian(cx, cy, iconRadius, midAngle);

        const iconGroup = document.createElementNS("http://www.w3.org/2000/svg", "foreignObject");
        iconGroup.setAttribute("x", iconPos.x - 19);
        iconGroup.setAttribute("y", iconPos.y - 19);
        iconGroup.setAttribute("width", 38);
        iconGroup.setAttribute("height", 38);

        const iconDiv = document.createElement("div");
        iconDiv.style.width = "38px";
        iconDiv.style.height = "38px";
        iconDiv.style.display = "flex";
        iconDiv.style.alignItems = "center";
        iconDiv.style.justifyContent = "center";
        iconDiv.style.transform = `rotate(${midAngle}deg)`;

        iconDiv.innerHTML = `
          <div style="
            width:36px;
            height:36px;
            border-radius:50%;
            background:rgba(0,0,0,.25);
            display:flex;
            align-items:center;
            justify-content:center;
            border:1px solid rgba(255,255,255,.3);
            box-shadow:0 0 0 1px rgba(255,255,255,.08) inset;
          ">
            <i class="fa-solid ${item.icon}" style="color:white; font-size:17px;"></i>
          </div>
        `;

        iconGroup.appendChild(iconDiv);
        wheelGroup.appendChild(iconGroup);

        const textRadius = 156;
        const textPos = polarToCartesian(cx, cy, textRadius, midAngle);

        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", textPos.x);
        text.setAttribute("y", textPos.y);
        text.setAttribute("class", "slice-text");
        text.setAttribute("transform", `rotate(${midAngle} ${textPos.x} ${textPos.y})`);

        let words = item.label.split(" ");
        let fontSize = 10;

        if (item.label.length > 8) fontSize = 9;
        if (item.label.length > 12) fontSize = 8;
        if (item.label.length > 16) fontSize = 7;
        if (item.label.length > 20) fontSize = 6;

        text.setAttribute("font-size", fontSize);

        if (words.length >= 2) {
          const half = Math.ceil(words.length / 2);
          const line1 = words.slice(0, half).join(" ");
          const line2 = words.slice(half).join(" ");

          const t1 = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
          t1.setAttribute("x", textPos.x);
          t1.setAttribute("dy", "-5");
          t1.textContent = line1;

          const t2 = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
          t2.setAttribute("x", textPos.x);
          t2.setAttribute("dy", "12");
          t2.textContent = line2;

          text.appendChild(t1);
          text.appendChild(t2);
        } else {
          text.textContent = item.label;
        }

        wheelGroup.appendChild(text);
      });
    }

    function onlyNumbers(str) {
      return String(str).replace(/\D/g, "");
    }

    function formatCPF(value) {
      value = onlyNumbers(value).slice(0, 11);
      value = value.replace(/(\d{3})(\d)/, "$1.$2");
      value = value.replace(/(\d{3})(\d)/, "$1.$2");
      value = value.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
      return value;
    }

    function formatPhone(value) {
      value = onlyNumbers(value).slice(0, 11);

      if (value.length <= 10) {
        value = value.replace(/(\d{2})(\d)/, "($1) $2");
        value = value.replace(/(\d{4})(\d)/, "$1-$2");
      } else {
        value = value.replace(/(\d{2})(\d)/, "($1) $2");
        value = value.replace(/(\d{5})(\d)/, "$1-$2");
      }

      return value;
    }

    function isValidCPF(cpf) {
      cpf = onlyNumbers(cpf);
      if (cpf.length !== 11) return false;
      if (/^(\d)\1+$/.test(cpf)) return false;

      let sum = 0;
      for (let i = 0; i < 9; i++) {
        sum += parseInt(cpf.charAt(i), 10) * (10 - i);
      }

      let firstDigit = 11 - (sum % 11);
      if (firstDigit >= 10) firstDigit = 0;
      if (firstDigit !== parseInt(cpf.charAt(9), 10)) return false;

      sum = 0;
      for (let i = 0; i < 10; i++) {
        sum += parseInt(cpf.charAt(i), 10) * (11 - i);
      }

      let secondDigit = 11 - (sum % 11);
      if (secondDigit >= 10) secondDigit = 0;
      if (secondDigit !== parseInt(cpf.charAt(10), 10)) return false;

      return true;
    }

    function isValidPhone(phone) {
      const digits = onlyNumbers(phone);
      return digits.length === 10 || digits.length === 11;
    }

    function getWeightedPrize() {
      const total = weightedPrizes.reduce((sum, item) => sum + item.weight, 0);
      let random = Math.random() * total;

      for (const item of weightedPrizes) {
        if (random < item.weight) return item;
        random -= item.weight;
      }

      return weightedPrizes[0];
    }

    function playSound(sound) {
      sound.currentTime = 0;
      sound.play().catch(() => {});
    }

    function unlockAudio() {
      [spinSound, winSound, loseSound].forEach(audio => {
        audio.volume = 0.8;
        audio.play().then(() => {
          audio.pause();
          audio.currentTime = 0;
        }).catch(() => {});
      });
    }

    cpfInput.addEventListener("input", (e) => {
      e.target.value = formatCPF(e.target.value);
    });

    telefoneInput.addEventListener("input", (e) => {
      e.target.value = formatPhone(e.target.value);
    });

function postData(payload) {
      return new Promise((resolve) => {
        const callbackName =
          "callback_" +
          Date.now() +
          "_" +
          Math.floor(Math.random() * 10000);

        let finished = false;

        const timeout = setTimeout(() => {
          if (finished) return;
          finished = true;

          resolve({
            ok: false,
            message: "Tempo esgotado ao conectar com a planilha."
          });

          delete window[callbackName];

          if (script && script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }, 15000);

        window[callbackName] = function(response) {
          if (finished) return;
          finished = true;

          clearTimeout(timeout);
          resolve(response);

          delete window[callbackName];

          if (script && script.parentNode) {
            script.parentNode.removeChild(script);
          }
        };

        const params = new URLSearchParams({
          ...payload,
          callback: callbackName,
          t: Date.now()
        });

        const script = document.createElement("script");
        script.src = `${SCRIPT_URL}?${params.toString()}`;

        script.onerror = function() {
          if (finished) return;
          finished = true;

          clearTimeout(timeout);

          resolve({
            ok: false,
            message: "Erro ao conectar com o Apps Script."
          });

          delete window[callbackName];

          if (script && script.parentNode) {
            script.parentNode.removeChild(script);
          }
        };

        document.body.appendChild(script);
      });
    }

    function setStartLoading(loading) {
      startBtn.disabled = loading;

      if (loading) {
        startBtn.textContent = "Validando";
        startBtn.classList.add("loading-dots");
      } else {
        startBtn.textContent = "Participar";
        startBtn.classList.remove("loading-dots");
      }
    }

    startBtn.addEventListener("click", async () => {
      unlockAudio();

      const nome = nomeInput.value.trim();
      const cpf = cpfInput.value.trim();
      const telefone = telefoneInput.value.trim();

      modalWarning.textContent = "";

      if (!nome || nome.length < 3) {
        modalWarning.textContent = "Digite um nome válido.";
        return;
      }

      if (!isValidCPF(cpf)) {
        modalWarning.textContent = "Digite um CPF válido.";
        return;
      }

      if (!isValidPhone(telefone)) {
        modalWarning.textContent = "Digite um telefone válido.";
        return;
      }

      setStartLoading(true);

      const result = await postData({
        action: "checkCpf",
        nome,
        cpf,
        telefone
      });

      if (!result.ok && result.alreadyPlayed) {
        modalWarning.textContent = "Este CPF já participou.";
        setStartLoading(false);
        return;
      }

      if (!result.ok) {
        modalWarning.textContent = result.message || "Erro ao validar CPF.";
        setStartLoading(false);
        return;
      }

      participant = { nome, cpf, telefone };
      entryModal.style.display = "none";
      spinBtn.disabled = false;
      message.textContent = "Agora é só girar a roleta ✨";
      setStartLoading(false);
    });

    function createConfettiBurst() {
      const amount = 120;

      for (let i = 0; i < amount; i++) {
        const confetti = document.createElement("div");
        confetti.style.position = "fixed";
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.top = "-20px";
        confetti.style.width = 6 + Math.random() * 10 + "px";
        confetti.style.height = 10 + Math.random() * 16 + "px";
        confetti.style.background = [
          "#ffcc00",
          "#ff7a00",
          "#e30016",
          "#ffffff",
          "#ff9a00"
        ][Math.floor(Math.random() * 5)];
        confetti.style.zIndex = 9999;
        confetti.style.borderRadius = Math.random() > 0.5 ? "2px" : "999px";
        confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
        confetti.style.opacity = "1";
        confetti.style.pointerEvents = "none";
        document.body.appendChild(confetti);

        const duration = 2200 + Math.random() * 1600;
        const drift = (Math.random() - 0.5) * 300;
        const fall = window.innerHeight + 120;

        confetti.animate([
          { transform: `translate(0,0) rotate(0deg) scale(1)`, opacity: 1 },
          { transform: `translate(${drift}px, ${fall}px) rotate(${700 + Math.random() * 800}deg) scale(${0.8 + Math.random() * 0.5})`, opacity: 0 }
        ], {
          duration,
          easing: "cubic-bezier(.21,.61,.35,1)"
        });

        setTimeout(() => confetti.remove(), duration);
      }
    }

    function launchConfetti() {
      createConfettiBurst();
      setTimeout(createConfettiBurst, 150);
      setTimeout(createConfettiBurst, 300);
      setTimeout(createConfettiBurst, 500);
      setTimeout(createConfettiBurst, 800);
    }

    function getTargetRotationForIndex(index) {
      const sliceAngle = 360 / prizes.length;
      const centerOfSlice = index * sliceAngle + sliceAngle / 2;
      return (360 - centerOfSlice) % 360;
    }

    spinBtn.addEventListener("click", async () => {
      if (isSpinning || !participant) return;

      isSpinning = true;
      spinBtn.disabled = true;
      resultBox.classList.remove("show");
      message.textContent = "Girando a roleta...";

      const selectedPrize = getWeightedPrize();
      const selectedIndex = prizes.findIndex(item => item.label === selectedPrize.label);
      const finalIndex = selectedIndex >= 0 ? selectedIndex : 0;

      spinSound.playbackRate = 1.15;
      playSound(spinSound);

      const desiredRotation = getTargetRotationForIndex(finalIndex);
      const extraTurns = 360 * (7 + Math.floor(Math.random() * 2));
      currentRotation = extraTurns + desiredRotation;

      wheelGroup.style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(async () => {
        spinSound.pause();
        spinSound.currentTime = 0;

        const save = await postData({
          action: "saveResult",
          nome: participant.nome,
          cpf: participant.cpf,
          telefone: participant.telefone,
          premio: selectedPrize.label
        });

        if (!save.ok) {
          if (save.alreadyPlayed) {
            message.textContent = "Este CPF já participou.";
          } else {
            message.textContent = save.message || "Erro ao salvar o prêmio.";
          }

          isSpinning = false;
          return;
        }

        let mensagem = "";

        if (selectedPrize.label === "Cupom 20%") {
          mensagem = `${participant.nome}, você ganhou ${selectedPrize.label}! 🎉

Cupom válido para compras acima de R$100 no APP ou SITE da Everest.`;

        } else if (selectedPrize.label === "Cupom 30%") {
          mensagem = `${participant.nome}, você ganhou ${selectedPrize.label}! 🎉

Cupom válido para compras acima de R$150 no APP ou SITE da Everest.`;

        } else if (selectedPrize.label === "Cupom 40%") {
          mensagem = `${participant.nome}, você ganhou ${selectedPrize.label}! 🎉

Cupom válido para compras acima de R$200 no APP ou SITE da Everest.`;

        } else {
          mensagem = `${participant.nome}, você ganhou: ${selectedPrize.label} 🎁`;
        }

        message.textContent = "Parabéns! Você ganhou ✨";
        launchConfetti();
        playSound(winSound);

        resultText.textContent = mensagem;
        resultBox.classList.add("show");

        isSpinning = false;
        spinBtn.disabled = true;
      }, 6200);
    });

    window.addEventListener("load", () => {
      renderWheel();
    });
  </script>
</body>
